  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

om:1px solid rgba(42,35,32,.08)\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <img src=\"fb2666e0-7632-445f-96ed-99c56cb7b8c0\" alt=\"Doenet\" style=\"width:40px;height:40px;display:block\">\n              <div style=\"display:flex;flex-direction:column;line-height:1\">\n                <span style=\"font:600 18px Fredoka,sans-serif;color:#2A2320\">Doenet<\u002Fspan>\n                <span style=\"font:700 10.5px Nunito;letter-spacing:.15em;text-transform:uppercase;color:#C07F4E;margin-top:3px\">Author Pods<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:24px;font:700 14px Nunito\">\n              <a href=\"#signup-1a\" style=\"color:#2A2320;text-decoration:none\">Sign up<\u002Fa>\n              <a href=\"#schedule-1a\" style=\"color:#2A2320;text-decoration:none\">Schedule of Existing Pods<\u002Fa><a href=\"https://beta.doenet.org\" target=\"_blank\" rel=\"noopener\" style=\"color:#2E9DC2;text-decoration:none\">Back to beta.doenet.org&nbsp;↗<\u002Fa>\n              \n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative;padding:66px 32px 58px;text-align:center;background:radial-gradient(130% 92% at 50% -22%,#D6F5FE 0%,#FBF3E6 56%);overflow:hidden\">\n            <div style=\"position:absolute;top:46px;left:72px;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,transparent 36%,#E2B488 37%);opacity:.55\"><\u002Fdiv>\n            <div style=\"position:absolute;bottom:54px;right:96px;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,transparent 36%,#84EAFF 37%);opacity:.7\"><\u002Fdiv>\n            <div style=\"position:absolute;top:120px;right:150px;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,transparent 34%,#E2B488 35%);opacity:.5\"><\u002Fdiv>\n            <div style=\"position:relative;max-width:690px;margin:0 auto\">\n              <img src=\"fb2666e0-7632-445f-96ed-99c56cb7b8c0\" alt=\"Doenet\" style=\"width:94px;height:94px;display:block;margin:0 auto 18px\">\n              <div style=\"font:700 12.5px Nunito;letter-spacing:.18em;text-transform:uppercase;color:#C07F4E;margin-bottom:15px\">Curriculum Group · Author Pods<\u002Fdiv>\n              <h1 style=\"font:600 50px/1.04 Fredoka,sans-serif;color:#2A2320;margin:0 0 18px;letter-spacing:-.01em\">Bake better activities, together.<\u002Fh1>\n              <p style=\"font:400 18px/1.6 Nunito;color:#5F554C;margin:0 auto 30px;max-width:560px\">An author pod is a small group - about three people - that meets regularly online over video (Zoom, Google Meet, Microsoft Teams - whatever suits the pod) to help each other build Doenet activities. There are two flavors - you are welcome to join as many as you like.<\u002Fp>\n              <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap\">\n                <a href=\"#proofing-1a\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 28px;border-radius:999px;background:#84EAFF;color:#154851;font:600 16px Fredoka,sans-serif;text-decoration:none;box-shadow:0 4px 0 #44B2D4\" style-hover=\"transform:translateY(2px);box-shadow:0 2px 0 #44B2D4\">Join a Proofing Room<\u002Fa>\n                <a href=\"#kitchen-1a\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 28px;border-radius:999px;background:#4A2E26;color:#FBF3E6;font:600 16px Fredoka,sans-serif;text-decoration:none;box-shadow:0 4px 0 #241009\" style-hover=\"transform:translateY(2px);box-shadow:0 2px 0 #241009\">Join a Test Kitchen<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:58px 32px;background:#FBF3E6\">\n            <div style=\"max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:26px\">\n\n              <div id=\"proofing-1a\" style=\"scroll-margin-top:20px;background:#fff;border-radius:24px;border:1px solid rgba(42,35,32,.08);box-shadow:0 18px 44px -24px rgba(42,35,32,.45);overflow:hidden\">\n                <div style=\"height:9px;background:#84EAFF\"><\u002Fdiv>\n                <div style=\"padding:28px 27px 30px\">\n                  <div style=\"display:flex;align-items:center;gap:13px\">\n                    <div style=\"width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,transparent 34%,#84EAFF 35%);flex:none\"><\u002Fdiv>\n                    <div>\n                      <h3 style=\"font:600 25px Fredoka;color:#2A2320;margin:0\">Proofing Room<\u002Fh3>\n                      <span style=\"display:inline-block;margin-top:4px;padding:3px 11px;border-radius:999px;background:#E1F7FF;color:#2A6A7D;font:700 10.5px Nunito;letter-spacing:.05em;text-transform:uppercase\">Silent working group<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <p style=\"font:600 16px/1.5 Nunito;color:#2A2320;margin:18px 0 16px\">Protected, quiet time to build - with built-in accountability.<\u002Fp>\n                  <div style=\"display:flex;flex-direction:column;gap:11px\">\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"width:15px;height:15px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#84EAFF 34%);flex:none;margin-top:4px\"><\u002Fspan><span style=\"font:400 15px/1.5 Nunito;color:#4A433D\">Work on your own activities in focused silence.<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"width:15px;height:15px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#84EAFF 34%);flex:none;margin-top:4px\"><\u002Fspan><span style=\"font:400 15px/1.5 Nunito;color:#4A433D\">Built-in accountability keeps everyone on track.<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"width:15px;height:15px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#84EAFF 34%);flex:none;margin-top:4px\"><\u002Fspan><span style=\"font:400 15px/1.5 Nunito;color:#4A433D\">Protected time on your calendar that's genuinely carved out to build.<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"width:15px;height:15px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#84EAFF 34%);flex:none;margin-top:4px\"><\u002Fspan><span style=\"font:400 15px/1.5 Nunito;color:#4A433D\">No agenda, no pressure - just show up and make progress.<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"margin-top:20px;background:#EAF9FF;border-radius:16px;padding:16px 18px\">\n                    <div style=\"font:700 10.5px Nunito;letter-spacing:.1em;text-transform:uppercase;color:#2A6A7D;margin-bottom:7px\">What a session looks like<\u002Fdiv>\n                    <p style=\"margin:0;font:400 14.5px/1.55 Nunito;color:#4A433D\">Everyone joins, says a quick hello, then works side-by-side in focused quiet. Need to talk something through? Slip into a breakout room.&nbsp;<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div id=\"kitchen-1a\" style=\"scroll-margin-top:20px;background:#fff;border-radius:24px;border:1px solid rgba(42,35,32,.08);box-shadow:0 18px 44px -24px rgba(42,35,32,.45);overflow:hidden\">\n                <div style=\"height:9px;background:#D89A66\"><\u002Fdiv>\n                <div style=\"padding:28px 27px 30px\">\n                  <div style=\"display:flex;align-items:center;gap:13px\">\n                    <div style=\"width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,transparent 34%,#5A3A2E 35%);flex:none\"><\u002Fdiv>\n                    <div>\n                      <h3 style=\"font:600 25px Fredoka;color:#2A2320;margin:0\">Test Kitchen<\u002Fh3>\n                      <span style=\"display:inline-block;margin-top:4px;padding:3px 11px;border-radius:999px;background:#F6E7D6;color:#9A5A2A;font:700 10.5px Nunito;letter-spacing:.05em;text-transform:uppercase\">Active collaboration<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <p style=\"font:600 16px/1.5 Nunito;color:#2A2320;margin:18px 0 16px\">Share what you're cooking up and get thoughtful, pedagogy-first feedback.<\u002Fp>\n                  <div style=\"display:flex;flex-direction:column;gap:11px\">\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"width:15px;height:15px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#D89A66 34%);flex:none;margin-top:4px\"><\u002Fspan><span style=\"font:400 15px/1.5 Nunito;color:#4A433D\">Bring an idea or an activity to share with the group.<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"width:15px;height:15px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#D89A66 34%);flex:none;margin-top:4px\"><\u002Fspan><span style=\"font:400 15px/1.5 Nunito;color:#4A433D\">Discussion centers on pedagogy - what could work better.<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"width:15px;height:15px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#D89A66 34%);flex:none;margin-top:4px\"><\u002Fspan><span style=\"font:400 15px/1.5 Nunito;color:#4A433D\">A soft expectation to come with something to show.<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"width:15px;height:15px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#D89A66 34%);flex:none;margin-top:4px\"><\u002Fspan><span style=\"font:400 15px/1.5 Nunito;color:#4A433D\">No one brought anything? It simply runs as a proofing room.<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"margin-top:20px;background:#FBEFE2;border-radius:16px;padding:16px 18px\">\n                    <div style=\"font:700 10.5px Nunito;letter-spacing:.1em;text-transform:uppercase;color:#9A5A2A;margin-bottom:10px\">What a session looks like<\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:9px\">\n                      <div style=\"display:flex;gap:12px;align-items:baseline\"><span style=\"flex:none;min-width:74px;font:700 12px Nunito;color:#9A5A2A\">~10 min<\u002Fspan><span style=\"font:400 14px/1.45 Nunito;color:#4A433D\">Check-in &amp; community time<\u002Fspan><\u002Fdiv>\n                      <div style=\"display:flex;gap:12px;align-items:baseline\"><span style=\"flex:none;min-width:74px;font:700 12px Nunito;color:#9A5A2A\">12–15 min<\u002Fspan><span style=\"font:400 14px/1.45 Nunito;color:#4A433D\">Each presenter - live demo or a volunteer run-through<\u002Fspan><\u002Fdiv>\n                      <div style=\"display:flex;gap:12px;align-items:baseline\"><span style=\"flex:none;min-width:74px;font:700 12px Nunito;color:#9A5A2A\">Feedback<\u002Fspan><span style=\"font:400 14px/1.45 Nunito;color:#4A433D\">Silent reflection or round-robin - passing always welcome<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <p style=\"margin:14px 2px 0;font:italic 400 13.5px/1.5 Nunito;color:#7A6E64\">Activities reviewed here can be shared with another pod for peer review and then move on toward the Curated Library of Activities.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n            <\u002Fdiv>\n            <p style=\"max-width:650px;margin:30px auto 0;text-align:center;font:600 15.5px/1.55 Nunito;color:#5F554C\">These aren't either/or - plenty of authors join a proofing room <em style=\"font-style:normal;color:#2A2320\">and<\u002Fem> a test kitchen (or a few test kitchens at once).<\u002Fp>\n          <\u002Fdiv>\n\n          <div id=\"signup-1a\" style=\"scroll-margin-top:20px;padding:58px 32px;background:linear-gradient(180deg,#D6F5FE,#C6EFFC)\">\n            <div style=\"max-width:720px;margin:0 auto;text-align:center\">\n              <div style=\"font:700 12.5px Nunito;letter-spacing:.16em;text-transform:uppercase;color:#2A7E97;margin-bottom:10px\">Sign up · Proofing Room<\u002Fdiv>\n              <h2 style=\"font:600 34px Fredoka;color:#163A44;margin:0 0 12px\">Just tell us when you're free<\u002Fh2>\n              <p style=\"font:400 17px/1.6 Nunito;color:#2C5563;margin:0 auto 18px;max-width:520px\">Proofing rooms aren't topic-specific - share your availability and we'll match you into a group.<\u002Fp>\n              <div style=\"display:inline-flex;align-items:center;gap:11px;margin:0 0 26px;background:#FBFDFF;border:1px solid rgba(21,69,81,.14);border-radius:999px;padding:7px 10px\">\n                <span style=\"font:800 10.5px Nunito;letter-spacing:.07em;text-transform:uppercase;color:#15454F;background:#84EAFF;padding:4px 11px;border-radius:999px;white-space:nowrap\">Summer 2026<\u002Fspan>\n                <span style=\"font:600 13px Nunito;color:#2C5563;padding-right:8px\">These surveys are for the summer term - new ones open for Fall &amp; Spring as those terms approach.<\u002Fspan>\n              <\u002Fdiv>\n              <a href=\"{{ proofUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;border-radius:999px;background:#4A2E26;color:#FBF3E6;font:600 16px Fredoka,sans-serif;text-decoration:none;box-shadow:0 4px 0 #241009\" style-hover=\"transform:translateY(2px);box-shadow:0 2px 0 #241009\">Take the availability survey&nbsp;↗<\u002Fa>\n              <div style=\"margin-top:16px;font:700 13px Nunito;color:#2C5563\">Meets online - Zoom, Google Meet, or Teams, your group's call<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:58px 32px;background:#FBF3E6\">\n            <div style=\"max-width:960px;margin:0 auto\">\n              <div style=\"text-align:center;margin-bottom:32px\">\n                <div style=\"font:700 12.5px Nunito;letter-spacing:.16em;text-transform:uppercase;color:#C07F4E;margin-bottom:10px\">Sign up · Test Kitchen<\u002Fdiv>\n                <h2 style=\"font:600 34px Fredoka;color:#2A2320;margin:0 0 11px\">Pick your subject<\u002Fh2>\n                <p style=\"font:400 17px/1.6 Nunito;color:#5F554C;margin:0 auto;max-width:560px\">Each topic has its own availability survey - join as many subjects as you like. Each kitchen picks its own meeting platform.<\u002Fp>\n                <div style=\"display:inline-flex;align-items:center;gap:11px;margin-top:18px;background:#fff;border:1px solid rgba(42,35,32,.09);border-radius:999px;padding:7px 10px\">\n                  <span style=\"font:800 10.5px Nunito;letter-spacing:.07em;text-transform:uppercase;color:#fff;background:#D89A66;padding:4px 11px;border-radius:999px;white-space:nowrap\">Summer 2026<\u002Fspan>\n                  <span style=\"font:600 13px Nunito;color:#5F554C;padding-right:8px\">These surveys are for the summer term - new ones open for Fall &amp; Spring as those terms approach.<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                <sc-for list=\"{{ tkTopics }}\" as=\"t\" hint-placeholder-count=\"13\">\n                  <div style=\"display:flex;align-items:center;gap:14px;background:#fff;border:1px solid rgba(42,35,32,.08);border-radius:16px;padding:15px 18px;box-shadow:0 7px 20px -14px rgba(42,35,32,.5)\" style-hover=\"transform:translateY(-2px);box-shadow:0 14px 26px -16px rgba(42,35,32,.5)\">\n                    <span style=\"width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#D89A66 34%);flex:none\"><\u002Fspan>\n                    <span style=\"flex:1;min-width:0\">\n                      <a href=\"{{ t.url }}\" target=\"_blank\" rel=\"noopener\" style=\"display:block;font:700 15px/1.3 Nunito;color:#2A2320;text-decoration:none\" style-hover=\"text-decoration:underline\">{{ t.name }}<\u002Fa>\n                      <sc-if value=\"{{ t.hasLead }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ t.mailto }}\" style=\"display:block;margin-top:2px;font:600 12px Nunito;color:#9A5A2A;text-decoration:none\" style-hover=\"text-decoration:underline\">{{ t.leadLabel }}<\u002Fa><\u002Fsc-if>\n                    <\u002Fspan>\n                    <a href=\"{{ t.url }}\" target=\"_blank\" rel=\"noopener\" style=\"flex:none;font:700 13px Nunito;color:#2E9DC2;text-decoration:none;white-space:nowrap\" style-hover=\"text-decoration:underline\">Open&nbsp;›<\u002Fa>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:22px;flex-wrap:wrap;background:#FBF6EC;border:2px dashed #E2C39B;border-radius:16px;padding:18px 22px\">\n                <div style=\"display:flex;align-items:center;gap:14px\">\n                  <span style=\"width:38px;height:38px;border-radius:50%;background:radial-gradient(circle,transparent 35%,#D89A66 36%);flex:none;display:flex;align-items:center;justify-content:center;font:700 17px Fredoka,sans-serif;color:#9A5A2A\">+<\u002Fspan>\n                  <div>\n                    <div style=\"font:700 16px Nunito;color:#2A2320\">Don't see your subject?<\u002Fdiv>\n                    <div style=\"font:400 13.5px/1.5 Nunito;color:#5F554C\">Suggest a new Test Kitchen topic and we'll help gather a pod around it.<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <a href=\"mailto:curriculum@doenet.org?subject=New%20Test%20Kitchen%20topic%20suggestion\" style=\"flex:none;display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:999px;background:#4A2E26;color:#FBF3E6;font:600 15px Fredoka,sans-serif;text-decoration:none;box-shadow:0 4px 0 #241009;white-space:nowrap\" style-hover=\"transform:translateY(2px);box-shadow:0 2px 0 #241009\">Suggest a topic&nbsp;↗<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div id=\"schedule-1a\" style=\"scroll-margin-top:20px;padding:58px 32px;background:#F2E6D1\">\n            <div style=\"max-width:960px;margin:0 auto\">\n              <div style=\"text-align:center\">\n                <div style=\"font:700 12.5px Nunito;letter-spacing:.16em;text-transform:uppercase;color:#C07F4E;margin-bottom:10px\">Already rising<\u002Fdiv>\n                <h2 style=\"font:600 34px Fredoka;color:#2A2320;margin:0 0 11px\">Pods meeting right now<\u002Fh2>\n                <p style=\"font:400 17px/1.6 Nunito;color:#5F554C;margin:0 auto;max-width:540px\">Hop into one that's already on the calendar, or use a survey above to start a fresh batch.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:32px\">\n                <div>\n                  <h4 style=\"display:flex;align-items:center;gap:9px;font:600 18px Fredoka;color:#2A2320;margin:0 0 14px\"><span style=\"width:17px;height:17px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#84EAFF 34%);flex:none\"><\u002Fspan>Proofing Rooms<\u002Fh4>\n                  <div style=\"display:flex;flex-direction:column;gap:10px\">\n                    <sc-for list=\"{{ proofRooms }}\" as=\"r\" hint-placeholder-count=\"5\">\n                      <div style=\"background:#fff;border-radius:14px;padding:13px 16px;border:1px solid rgba(42,35,32,.07);display:flex;align-items:center;justify-content:space-between;gap:12px\">\n                        <div>\n                          <div style=\"font:700 14.5px Nunito;color:#2A2320\"><span>{{ r.day }}<\u002Fspan> · <span style=\"color:#5F554C;font-weight:600\">{{ r.time }}<\u002Fspan><\u002Fdiv>\n                          <div style=\"margin-top:2px\"><sc-if value=\"{{ r.hasMail }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ r.hostMailto }}\" style=\"font:400 12.5px Nunito;color:#7A6E64;text-decoration:none\" style-hover=\"text-decoration:underline\">{{ r.members }}<\u002Fa><\u002Fsc-if><sc-if value=\"{{ r.noMail }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font:400 12.5px Nunito;color:#7A6E64\">{{ r.members }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                        <\u002Fdiv>\n                        <sc-if value=\"{{ r.linked }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ r.hostUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"flex:none;display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:999px;background:#84EAFF;color:#154851;font:700 11.5px Nunito;text-decoration:none;white-space:nowrap\" style-hover=\"background:#6FE0F7\">Join on Zoom&nbsp;↗<\u002Fa><\u002Fsc-if><sc-if value=\"{{ r.pending }}\" hint-placeholder-val=\"{{ true }}\"><span title=\"Zoom link coming soon\" style=\"flex:none;padding:6px 13px;border-radius:999px;background:#EDE4D6;color:#9A8A78;font:700 11.5px Nunito;white-space:nowrap\">Join on Zoom<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ r.open }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:none;padding:4px 11px;border-radius:999px;background:#E1F7FF;color:#2A6A7D;font:700 11px Nunito\">Open<\u002Fspan><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <h4 style=\"display:flex;align-items:center;gap:9px;font:600 18px Fredoka;color:#2A2320;margin:0 0 14px\"><span style=\"width:17px;height:17px;border-radius:50%;background:radial-gradient(circle,transparent 33%,#D89A66 34%);flex:none\"><\u002Fspan>Test Kitchens<\u002Fh4>\n                  <div style=\"display:flex;flex-direction:column;gap:10px\">\n                    <sc-for list=\"{{ testKitchens }}\" as=\"k\" hint-placeholder-count=\"5\">\n                      <div style=\"background:#fff;border-radius:14px;padding:13px 16px;border:1px solid rgba(42,35,32,.07)\">\n                        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n                          <div style=\"font:700 14.5px Nunito;color:#2A2320\"><span>{{ k.day }}<\u002Fspan> · <span style=\"color:#5F554C;font-weight:600\">{{ k.timeLabel }}<\u002Fspan><\u002Fdiv>\n                          <sc-if value=\"{{ k.hasFocus }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:none;padding:4px 10px;border-radius:999px;background:#F6E7D6;color:#9A5A2A;font:700 11px Nunito\">{{ k.focus }}<\u002Fspan><\u002Fsc-if>\n                        <\u002Fdiv>\n                        <div style=\"font:400 12.5px Nunito;color:#7A6E64;margin-top:3px\">{{ k.members }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:center;margin-top:24px;font:700 13px Nunito;color:#7A6E64\">Proofing rooms can run on any platform (Zoom, Meet, Teams, etc.) the host chooses.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:56px 32px;background:#FBF3E6;border-top:1px solid rgba(42,35,32,.06)\">\n            <div style=\"max-width:880px;margin:0 auto;text-align:center\">\n              <div style=\"font:700 12.5px Nunito;letter-spacing:.16em;text-transform:uppercase;color:#C07F4E;margin-bottom:10px\">Beyond the pods<\u002Fdiv>\n              <h2 style=\"font:600 32px Fredoka;color:#2A2320;margin:0 0 8px\">Other ways to get involved<\u002Fh2>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:26px;text-align:left\">\n                <div style=\"background:#fff;border-radius:18px;border:1px solid rgba(42,35,32,.08);padding:22px 22px\">\n                  <h4 style=\"font:600 18px Fredoka;color:#2A2320;margin:0 0 8px;display:flex;align-items:center;gap:9px\">Content organization group <span style=\"padding:3px 10px;border-radius:999px;background:#F1E7D6;color:#9A5A2A;font:700 10px Nunito;letter-spacing:.05em;text-transform:uppercase\">Coming soon<\u002Fspan><\u002Fh4>\n                  <p style=\"font:400 14.5px/1.55 Nunito;color:#5F554C;margin:0\">Help shape how Doenet activities get classified and found.<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"background:#fff;border-radius:18px;border:1px solid rgba(42,35,32,.08);padding:22px 22px\">\n                  <h4 style=\"font:600 18px Fredoka;color:#2A2320;margin:0 0 8px;display:flex;align-items:center;gap:9px\">Subject editors <span style=\"padding:3px 10px;border-radius:999px;background:#F1E7D6;color:#9A5A2A;font:700 10px Nunito;letter-spacing:.05em;text-transform:uppercase\">Coming soon<\u002Fspan><\u002Fh4>\n                  <p style=\"font:400 14.5px/1.55 Nunito;color:#5F554C;margin:0\">Curate activities for the upcoming Curated Library so instructors can trust what they pick up.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"margin:26px 0 0;font:400 16px Nunito;color:#5F554C\">Curious about any of these? Email <a href=\"mailto:curriculum@doenet.org\" style=\"color:#2E9DC2;font-weight:700;text-decoration:none\">curriculum@doenet.org<\u002Fa>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:34px 32px;background:#2A1C16;color:#E9D9C8\">\n            <div style=\"max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <img src=\"fb2666e0-7632-445f-96ed-99c56cb7b8c0\" alt=\"Doenet\" style=\"width:34px;height:34px;display:block\">\n                <div style=\"font:600 16px Fredoka;color:#fff\">Doenet Author Pods<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:24px;font:700 13.5px Nunito\">\n                <a href=\"https://beta.doenet.org\" target=\"_blank\" rel=\"noopener\" style=\"color:#9FE7FA;text-decoration:none\">beta.doenet.org<\u002Fa>\n                <a href=\"mailto:curriculum@doenet.org\" style=\"color:#9FE7FA;text-decoration:none\">curriculum@doenet.org<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const wig = (c) => `https://whenisgood.net/${c}`;\n    const tkTopics = [\n      { name: 'Developmental Math / Intermediate Algebra / Algebra 1', code: '7n5c82d', lead: 'Anurag Katyal', email: 'anurag@whyoverhow.com' },\n      { name: 'Geometry', code: '4ki8mea', lead: '' },\n      { name: 'College Algebra / Algebra 2', code: 'j3hxd8s', lead: 'Mike Weimerskirch', email: 'weim0024@umn.edu' },\n      { name: 'Precalculus & Trigonometry', code: 'rpjm27y', lead: 'Mike Weimerskirch', email: 'weim0024@umn.edu' },\n      { name: 'Calculus (non–trig-based)', code: 'tahepd4', lead: '' },\n      { name: 'Calculus 1 & 2 (trig-based)', code: 'gysk2zt', lead: '' },\n      { name: 'Differential Equations & Linear Algebra', code: '79knet5', lead: '' },\n      { name: 'Statistics', code: '5xtkjcp', lead: '' },\n      { name: 'Quantitative Reasoning / Math for Liberal Arts', code: 'px44sc2', lead: 'Jinsook Park', email: 'jpark@hartford.edu' },\n      { name: 'Math Education / Pre-Service Teacher Ed', code: 'dfr57eb', lead: '' },\n      { name: 'Multivariable Calculus', code: '7z2rtw9', lead: '' },\n      { name: 'Discrete Math', code: '8ic23ad', lead: 'Melissa Lynn', email: 'lynn5@stolaf.edu' },\n      { name: 'Computer Science', code: 'bgjg4cq', lead: 'Melissa Lynn', email: 'lynn5@stolaf.edu' },\n    ].map(t => ({ ...t, url: wig(t.code), hasLead: !!t.lead, leadLabel: t.lead ? ('Lead · ' + t.lead + (t.email ? ' (' + t.email + ')' : '')) : '', mailto: t.email ? ('mailto:' + t.email) : '' }));\n\n    const proofRooms = [\n      { day: 'Mondays', time: '1:00 PM - 2:30 PM ET', members: 'Hosted by Anurag Katyal (anurag@whyoverhow.com)', hostMail: 'anurag@whyoverhow.com', hostUrl: 'http://zoom.doenet.org', open: false },\n      { day: 'Wednesdays', time: '1:00 PM - 2:30 PM ET', members: 'Hosted by Anurag Katyal (anurag@whyoverhow.com)', hostMail: 'anurag@whyoverhow.com', hostUrl: 'http://zoom.doenet.org', open: false },\n      { day: 'Tuesdays', time: '12:30 PM ET', members: 'Hosted by Aishwarya Ravi (ravia@pbsc.edu)', hostMail: 'ravia@pbsc.edu', hostPending: true, open: false },\n      { day: 'Thursdays', time: '12:30 PM ET', members: 'Hosted by Aishwarya Ravi (ravia@pbsc.edu)', hostMail: 'ravia@pbsc.edu', hostPending: true, open: false },\n      { day: 'Fridays', time: 'Time TBD', members: 'Open - suggest a time that works', open: true },\n    ].map(r => ({ ...r, linked: !!r.hostUrl, plain: !r.hostUrl, pending: !r.hostUrl && !!r.hostPending, hasMail: !!r.hostMail, noMail: !r.hostMail, hostMailto: r.hostMail ? ('mailto:' + r.hostMail) : '' }));\n\n    const testKitchens = [\n      { day: 'Tuesdays', time: '4:00 PM ET', focus: 'Calculus', members: 'Nicholas · Jinsook · Kris' },\n      { day: 'Wednesdays', time: '3:00 PM ET', focus: 'Quantitative Reasoning', members: 'Jinsook · Mary' },\n      { day: 'Thursdays', time: '10:00 AM ET', focus: 'Mixed Topics', members: 'Megan · Anurag · Carrie · Carly' },\n      { day: 'Thursdays', time: '4:00 PM ET', focus: 'Precalculus & Trigonometry', members: 'Nick · Mike' },\n    ].map(k => ({ ...k, timeLabel: k.time || 'Time TBD', hasFocus: !!k.focus && k.focus !== 'General' }));\n\n    return {\n      proofUrl: 'https://whenisgood.net/7w77jen',\n      tkTopics,\n      proofRooms,\n      testKitchens,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
